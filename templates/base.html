<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Dashboard{% endblock %}</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        /* NAVBAR */
        .navbar {
            background-color: #343a40;
            color: white;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            position: fixed;
            width: 97.5%;
            top: 0;
            z-index: 100;
        }

        /* LAYOUT */
        .layout {
            margin-top: 30px;
        }

        /* SIDEBAR */
        .sidebar {
            width: 250px;
            background-color: #212529;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            color: #c2c7d0;
            overflow-y: auto;
        }

        .sidebar h3 {
            padding: 15px;
            margin: 0;
            color: white;
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: #c2c7d0;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #343a40;
            color: white;
        }

        /* CONTEÚDO */
        .content {
            margin-left: 250px;
            padding: 20px;
        }

        /* CARDS (AdminLTE-like) */
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 4px;
            box-shadow: 0 0 5px rgba(0,0,0,.1);
        }

        .card h3 {
            margin: 0;
            font-size: 18px;
        }

        .card p {
            font-size: 26px;
            margin: 10px 0 0;
        }

        .graficos-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div>Consultas Médicas</div>
    <div>
        {{ user.username }} |
        <form method="post" action="{% url 'logout' %}" style="display:inline;">
             {% csrf_token %}
         <button type="submit" style="background:none; border:none; color:white; cursor:pointer;">
            Sair
         </button>
</form>
    </div>
</div>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Menu</h3>

        <a href="{% url 'dashboard' %}">📊 Dashboard</a>
        <a href="{% url 'pacientes_lista' %}">👤 Pacientes</a>
        <a href="{% url 'medicos_lista' %}">👨‍⚕️ Médicos</a>
        <a href="{% url 'consultas_agenda' %}">📅 Consultas</a>
        <a href="{% url 'exames_lista' %}">🧪 Exames</a>

        <a href="{% url 'pagamentos_lista' %}">💰 Pagamentos</a>

    </div>

    <!-- CONTEÚDO DINÂMICO -->
    <div class="content">
        {% block content %}{% endblock %}
    </div>

</div>

</body>
</html>
